<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps & Docker Pipeline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .pipeline {
      background: rgba(255,255,255,0.85);
      padding: 20px;
      border-radius: 12px;
      width: 95%;
      height: 85%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    .stage {
      flex: 1;
      margin: 0 10px;
      background: rgba(255,255,255,0.95);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    .stage h2 {
      font-size: 1.1em;
      color: #000;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stage p {
      font-size: 0.9em;
      color: #000;
      font-weight: bold;
      margin: 0;
      line-height: 1.3;
    }
    .arrow {
      font-size: 1.5em;
      color: #000;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="pipeline">
    <div class="stage">
      <h2>Plan</h2>
      <p>Decide features & infra</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Code</h2>
      <p>Write & commit changes</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Build</h2>
      <p>Create Docker images</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Test</h2>
      <p>Run automated checks</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Release</h2>
      <p>Tag & push images</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Deploy</h2>
      <p>Run in staging/prod</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Operate</h2>
      <p>Monitor containers</p>
    </div>
    <div class="arrow">→</div>
    <div class="stage">
      <h2>Feedback</h2>
      <p>Improve next cycle</p>
    </div>
  </div>
</body>
</html>
